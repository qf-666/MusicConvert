name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare ASCII build directory
        shell: bash
        run: |
          SOURCE_APP_DIR="$(find . -mindepth 2 -maxdepth 2 -name project.yml -print -quit | xargs dirname)"
          test -n "$SOURCE_APP_DIR"
          rm -rf app
          mkdir -p app
          rsync -a "$SOURCE_APP_DIR"/ app/
          echo "APP_DIR=$GITHUB_WORKSPACE/app" >> "$GITHUB_ENV"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        shell: bash
        run: |
          cd "$APP_DIR"
          xcodegen generate

      - name: Resolve package dependencies
        shell: bash
        run: |
          cd "$APP_DIR"
          xcodebuild -resolvePackageDependencies -project MusicConvert.xcodeproj -scheme MusicConvert

      - name: Build app
        shell: bash
        run: |
          cd "$APP_DIR"
          xcodebuild \
            -project MusicConvert.xcodeproj \
            -scheme MusicConvert \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned ipa
        shell: bash
        run: |
          cd "$APP_DIR"
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          (
            cd dist
            zip -qry MusicConvert-unsigned.ipa Payload
          )
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp dist/MusicConvert-unsigned.ipa "$GITHUB_WORKSPACE/dist/MusicConvert-unsigned.ipa"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: MusicConvert-unsigned-ipa
          path: dist/MusicConvert-unsigned.ipa

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/MusicConvert-unsigned.ipa
