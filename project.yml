name: MusicConvert
options:
  bundleIdPrefix: com.qf666
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.10
packages:
  FFmpegIOS:
    url: https://github.com/kewlbear/FFmpeg-iOS.git
    branch: main
  FFmpegIOSSupport:
    url: https://github.com/kewlbear/FFmpeg-iOS-Support.git
    branch: main
targets:
  MusicConvert:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qf666.musicconvert
        PRODUCT_NAME: MusicConvert
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_CFBundleDisplayName: MusicConvert
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    dependencies:
      - package: FFmpegIOS
        product: FFmpeg-iOS
      - package: FFmpegIOSSupport
        product: FFmpeg-iOS-Support
