name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project MusicConvert.xcodeproj -scheme MusicConvert

      - name: Build app
        run: |
          xcodebuild \
            -project MusicConvert.xcodeproj \
            -scheme MusicConvert \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned ipa
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          cd dist
          zip -qry MusicConvert-unsigned.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: MusicConvert-unsigned-ipa
          path: dist/MusicConvert-unsigned.ipa
