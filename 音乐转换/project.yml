name: MusicConvert
options:
  bundleIdPrefix: com.qf666
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.10
packages:
  FFmpegIOS:
    url: https://github.com/kewlbear/FFmpeg-iOS.git
    branch: main
  FFmpegIOSSupport:
    url: https://github.com/kewlbear/FFmpeg-iOS-Support.git
    branch: main
targets:
  MusicConvert:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qf666.musicconvert
        PRODUCT_NAME: MusicConvert
        CURRENT_PROJECT_VERSION: 3
        MARKETING_VERSION: 1.0.2
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: "\u97F3\u4E50\u8F6C\u6362"
        LSApplicationCategoryType: public.app-category.music
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        UIApplicationSupportsIndirectInputEvents: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: KGM Audio
            LSItemContentTypes:
              - com.kugou.kgm
              - com.kugou.kgma
              - com.kugou.vpr
            LSHandlerRank: Alternate
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.kugou.kgm
            UTTypeConformsTo:
              - public.audio
              - public.data
            UTTypeDescription: KuGou Music File
            UTTypeTagSpecification:
              public.filename-extension:
                - kgm
          - UTTypeIdentifier: com.kugou.kgma
            UTTypeConformsTo:
              - public.audio
              - public.data
            UTTypeDescription: KuGou Music File
            UTTypeTagSpecification:
              public.filename-extension:
                - kgma
          - UTTypeIdentifier: com.kugou.vpr
            UTTypeConformsTo:
              - public.audio
              - public.data
            UTTypeDescription: KuGou VPR File
            UTTypeTagSpecification:
              public.filename-extension:
                - vpr
    dependencies:
      - package: FFmpegIOS
        product: FFmpeg-iOS
      - package: FFmpegIOSSupport
        product: FFmpeg-iOS-Support
